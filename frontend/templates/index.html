{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>py_chat</title>
    <link rel="icon" type="image/png" href="{% static 'assets/image.png' %}">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .msg-animate { animation: fadeInUp 0.2s ease-out; }

      @keyframes pulse-once { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
      .pulse { animation: pulse-once 0.2s ease-out; }

      @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: calc(200px + 100%) 0; } }
      .shimmer { background: linear-gradient(90deg, hsl(234,15%,13%) 25%, hsl(234,15%,18%) 50%, hsl(234,15%,13%) 75%); background-size: 200px 100%; animation: shimmer 1.5s infinite; border-radius: 10px; }

      .custom-scrollbar::-webkit-scrollbar { width: 5px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: hsl(230, 9%, 18%); border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: hsl(230, 9%, 26%); }

      .bubble-me { position: relative; border-bottom-right-radius: 4px !important; }
      .bubble-me::after { content: ''; position: absolute; bottom: 0; right: -8px; width: 0; height: 0; border: 8px solid transparent; border-left-color: #2563eb; border-bottom-color: #2563eb; }
      .bubble-them { position: relative; border-bottom-left-radius: 4px !important; }
      .bubble-them::after { content: ''; position: absolute; bottom: 0; left: -8px; width: 0; height: 0; border: 8px solid transparent; border-right-color: hsl(234, 15%, 16%); border-bottom-color: hsl(234, 15%, 16%); }

      #emoji-picker::-webkit-scrollbar { display: none; }
    </style>
    <script>
      const dbContacts = {{ contacts_json|safe }};
      const currentUserName = "{{ request.user.username }}";
      const selectedUserId = {{ selected_user_id }};
      const csrfToken = "{{ csrf_token }}";
    </script>
    <script src="{% static 'js/script.js' %}"></script>
  </head>
  <body class="h-screen flex flex-row bg-[hsl(232,15%,10%)]">
    <aside class="min-h-screen w-[25%] bg-[hsl(231,16%,9%)] text-white flex flex-col border-r-2 border-[hsl(230,9%,14%)]">
      <div class="aside-top flex justify-between items-center px-6 py-4">
        <div class="logo">
          <img src="{% static 'assets/image.png' %}" alt="logo" class="h-12 w-auto rounded-lg" />
        </div>
        <div class="border border-[hsl(230,9%,14%)] p-2 rounded-md shadow-2xl hover:bg-[hsl(234,15%,15%)] transition-colors duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
            <path d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm70-80h79l14-106q31-8 57.5-23.5T639-327l99 41 39-68-86-65q5-14 7-29.5t2-31.5q0-16-2-31.5t-7-29.5l86-65-39-68-99 42q-22-23-48.5-38.5T533-694l-13-106h-79l-14 106q-31 8-57.5 23.5T321-633l-99-41-39 68 86 64q-5 15-7 30t-2 32q0 16 2 31t7 30l-86 65 39 68 99-42q22 23 48.5 38.5T427-266l13 106Zm42-180q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm-2-140Z"/>
          </svg>
        </div>
      </div>

      <div class="search-box flex items-center p-3.5 mx-6 my-4 gap-3 bg-[hsl(234,15%,13%)] border rounded-[6px] border-[hsl(230,9%,14%)] shadow-xl">
        <span>
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
            <path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
          </svg>
        </span>
        <input type="search" name="search_box" placeholder="Search Conversation..." autocomplete="off" class="outline-0 w-full" oninput="filterContacts(this.value)" />
      </div>

      <div class="message-type">
        <div class="flex py-4 px-6 items-center border-b-2 border-t-2 border-[hsl(230,9%,14%)] text-[1.25em] font-bold">
          <span>Contact List</span>
        </div>
      </div>

      <div id="contact-list" class="flex-1 overflow-y-auto space-y-2 p-4 custom-scrollbar"></div>

      <div class="p-4 border-t shrink-0 border-[hsl(230,9%,14%)] flex items-center space-x-2" id="aside-profile">
        <div>
          <img src="https://api.dicebear.com/7.x/thumbs/svg?seed={{ request.user.username }}" alt="user-avatar" class="h-12 w-auto rounded-md" />
        </div>
        <div class="flex flex-col flex-1">
          <span id="aside-username">{{ request.user.username }}</span>
          <span class="text-green-400 text-xs">● Online</span>
        </div>
        <div class="ml-auto gap-1 bg-[hsl(234,15%,13%)] p-2 rounded-lg shadow-2xl hover:bg-[hsl(234,15%,15%)] transition-colors duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
            <path d="M160-200v-80h80v-280q0-83 50-147.5T420-792v-28q0-25 17.5-42.5T480-880q25 0 42.5 17.5T540-820v28q80 20 130 84.5T720-560v280h80v80H160Zm320-300Zm0 420q-33 0-56.5-23.5T400-160h160q0 33-23.5 56.5T480-80ZM320-280h320v-280q0-66-47-113t-113-47q-66 0-113 47t-47 113v280Z"/>
          </svg>
        </div>
      </div>
    </aside>

    <main class="min-h-full flex-1 text-white flex flex-col overflow-hidden">
      <div class="flex space-x-4 py-4 px-3">
        <img id="chat-avatar" src="./assets/fox-p.png" alt="avatar-img" class="h-[3.5em] rounded-lg shadow-2xl" onerror="initialsAvatar(this, activeContact?.name || '?')" />
        <div class="flex flex-col flex-1">
          <div class="flex items-center gap-2">
            <span id="ws-status-dot" class="inline-block w-2.5 h-2.5 rounded-full bg-red-500"></span>
            <span id="chat-username" class="font-medium"></span>
          </div>
          <span id="chat-status" class="text-sm text-gray-400"></span>
        </div>

        <div class="flex space-x-4 items-center justify-center">
          <div class="bg-[hsl(234,15%,13%)] rounded-lg p-2 shadow-2xl hover:bg-[hsl(234,15%,15%)] transition-colors duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
              <path d="M798-120q-125 0-247-54.5T329-329Q229-429 174.5-551T120-798q0-18 12-30t30-12h162q14 0 25 9.5t13 22.5l26 140q2 16-1 27t-11 19l-97 98q20 37 47.5 71.5T387-386q31 31 65 57.5t72 48.5l94-94q9-9 23.5-13.5T670-390l138 28q14 4 23 14.5t9 23.5v162q0 18-12 30t-30 12ZM241-600l66-66-17-94h-89q5 41 14 81t26 79Zm358 358q39 17 79.5 27t81.5 13v-88l-94-19-67 67ZM241-600Zm358 358Z"/>
            </svg>
          </div>
          <div class="bg-[hsl(234,15%,13%)] rounded-lg p-2 shadow-2xl hover:bg-[hsl(234,15%,15%)] transition-colors duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
              <path d="M360-320h80v-120h120v-80H440v-120h-80v120H240v80h120v120ZM160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h480q33 0 56.5 23.5T720-720v180l160-160v440L720-420v180q0 33-23.5 56.5T640-160H160Zm0-80h480v-480H160v480Zm0 0v-480 480Z"/>
            </svg>
          </div>
          <div id="search-msg-btn" class="bg-[hsl(234,15%,13%)] rounded-lg p-2 shadow-2xl hover:bg-[hsl(234,15%,15%)] transition-colors duration-300 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
              <path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
            </svg>
          </div>
          <div id="delete-chat-btn" class="bg-[hsl(234,15%,13%)] rounded-lg p-2 shadow-2xl hover:bg-red-600/30 transition-colors duration-300 cursor-pointer" onclick="deleteChat()">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
              <path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/>
            </svg>
          </div>
        </div>
      </div>

      <div id="msg-search-bar" class="hidden px-3 py-2 border-b border-[hsl(230,9%,14%)]">
        <div class="flex items-center gap-2 bg-[hsl(234,15%,13%)] border border-[hsl(230,9%,14%)] rounded-lg px-3 py-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="#9ca3af">
            <path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
          </svg>
          <input id="msg-search-input" type="text" placeholder="Search messages..." autocomplete="off" class="outline-0 w-full text-sm bg-transparent text-white" oninput="searchMessages(this.value)" />
          <span id="search-count" class="text-xs text-gray-500 shrink-0"></span>
        </div>
      </div>

      <div id="chat-message" class="flex-1 border-2 border-[hsl(230,9%,14%)] p-4 custom-scrollbar overflow-y-auto min-h-0">
        <div id="empty-chat" class="flex flex-col items-center justify-center h-full text-gray-500">
          <svg xmlns="http://www.w3.org/2000/svg" height="64px" viewBox="0 -960 960 960" width="64px" fill="currentColor" class="mb-4 opacity-40">
            <path d="M240-400h320v-80H240v80Zm0-120h480v-80H240v80Zm0-120h480v-80H240v80ZM80-80v-720q0-33 23.5-56.5T160-880h640q33 0 56.5 23.5T880-800v480q0 33-23.5 56.5T800-240H240L80-80Zm126-240h594v-480H160v525l46-45Zm-46 0v-480 480Z"/>
          </svg>
          <p class="text-lg font-medium">No messages yet</p>
          <p class="text-sm mt-1">Send a message to start the conversation</p>
        </div>
      </div>

      <div id="typing-indicator" class="hidden px-4 py-1"></div>

      <div class="flex items-center justify-center p-4 bg-[hsl(234,15%,13%)] space-x-4 m-5 rounded-[15px] border-2 border-[hsl(230,9%,14%)]">
        <div id="attach-btn" class="cursor-pointer relative">
          <svg class="bg-[hsl(234,15%,13%)] rounded-lg shadow-2xl pointer-events-none" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
            <path d="M720-330q0 104-73 177T470-80q-104 0-177-73t-73-177v-370q0-75 52.5-127.5T400-880q75 0 127.5 52.5T580-700v350q0 46-32 78t-78 32q-46 0-78-32t-32-78v-370h80v370q0 13 8.5 21.5T470-320q13 0 21.5-8.5T500-350v-350q-1-42-29.5-71T400-800q-42 0-71 29t-29 71v370q-1 71 49 120.5T470-160q70 0 119-49.5T640-330v-390h80v390Z"/>
          </svg>
          <input id="file-input" type="file" accept="image/*" class="opacity-0 absolute inset-0 w-full h-full cursor-pointer">
        </div>
        <input id="msg-input" class="outline-0 p-2 w-full" type="text" placeholder="Write a message..." class="flex-1" autocomplete="off" />
        <div id="emoji-btn" class="relative cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
            <path d="M480-480Zm0 400q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q43 0 83 8.5t77 24.5v90q-35-20-75.5-31.5T480-800q-133 0-226.5 93.5T160-480q0 133 93.5 226.5T480-160q133 0 226.5-93.5T800-480q0-32-6.5-62T776-600h86q9 29 13.5 58.5T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm320-600v-80h-80v-80h80v-80h80v80h80v80h-80v80h-80ZM620-520q25 0 42.5-17.5T680-580q0-25-17.5-42.5T620-640q-25 0-42.5 17.5T560-580q0 25 17.5 42.5T620-520Zm-280 0q25 0 42.5-17.5T400-580q0-25-17.5-42.5T340-640q-25 0-42.5 17.5T280-580q0 25 17.5 42.5T340-520Zm263.5 221.5Q659-337 684-400H276q25 63 80.5 101.5T480-260q68 0 123.5-38.5Z"/>
          </svg>
          <div id="emoji-picker" class="hidden absolute bottom-10 right-0 bg-[hsl(234,15%,13%)] border border-[hsl(230,9%,14%)] rounded-xl p-3 shadow-2xl z-50" style="width: 300px; height: 250px; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;"></div>
        </div>
        <div id="send-btn" class="bg-blue-600 hover:bg-blue-700 transition-colors duration-300 p-2 rounded-lg shadow-2xl cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
            <path d="M120-160v-640l760 320-760 320Zm80-120 474-200-474-200v140l240 60-240 60v140Zm0 0v-400 400Z"/>
          </svg>
        </div>
      </div>
    </main>

    <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60">
      <div class="bg-[hsl(234,15%,13%)] border border-[hsl(230,9%,14%)] rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
        <div class="flex items-center gap-3 mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" height="28px" viewBox="0 -960 960 960" width="28px" fill="#ef4444">
            <path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/>
          </svg>
          <h3 class="text-lg font-semibold text-white">Delete Chat</h3>
        </div>
        <p class="text-gray-300 text-sm mb-6" id="confirm-msg">Are you sure you want to delete all messages?</p>
        <div class="flex gap-3 justify-end">
          <button id="confirm-cancel" class="px-4 py-2 rounded-lg text-sm bg-gray-700 hover:bg-gray-600 text-white transition-colors">Cancel</button>
          <button id="confirm-ok" class="px-4 py-2 rounded-lg text-sm bg-red-600 hover:bg-red-700 text-white transition-colors">Delete</button>
        </div>
      </div>
    </div>
  </body>
</html>
