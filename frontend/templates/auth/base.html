<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block auth_title %}MeroChat Auth{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-500 tracking-tight">MeroChat</h1>
            <p class="text-gray-400 mt-2">Connect with the world in real-time.</p>
        </div>

        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
            <h2 class="text-2xl font-semibold mb-6 text-center">
                {% block form_header %}{% endblock %}
            </h2>

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                {% block auth_content %}
                {% endblock %}

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">
                    {% block button_text %}Submit{% endblock %}
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-400">
                {% block auth_footer %}{% endblock %}
            </div>
        </div>
        
        <div class="text-center mt-6">
            <a href="{% url 'landing' %}" class="text-gray-500 hover:text-gray-300 text-sm transition">← Back to home</a>
        </div>
    </div>

</body>
</html>
